  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.18"/>
      <stop offset="42%" stop-color="#00b8b8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#020608" stop-opacity="0"/>
