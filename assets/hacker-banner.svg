    <linearGradient id="scanGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#00f5ff" stop-opacity="0.16"/>
      <stop offset="0.52" stop-color="#7dfff1" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#00f5ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="microGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" stroke="#00f5ff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="scanlines" width="1000" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 0H1000" stroke="#7dfff1" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-80%" width="160%" height="260%">
