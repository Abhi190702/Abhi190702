<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abhijeet Ranjan ASCII profile</title>
  <desc id="desc">A terminal-style profile panel with an ASCII rendering of Abhijeet Ranjan's red sword A logo.</desc>
  <defs>
    <radialGradient id="redAura" cx="22%" cy="48%" r="48%">
      <stop offset="0" stop-color="#ef1b24" stop-opacity="0.17"/>
      <stop offset="0.55" stop-color="#7f1118" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#05070a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ef3340" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#ef3340" stop-opacity="0.58"/>
      <stop offset="0.78" stop-color="#ef3340" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ef3340" stop-opacity="0"/>
    </linearGradient>
    <pattern id="scanlines" width="1000" height="5" patternUnits="userSpaceOnUse">
      <path d="M0 0H1000" stroke="#ffffff" stroke-opacity="0.025"/>
    </pattern>
    <filter id="redGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.4  0 0 0 0 0.02  0 0 0 0 0.03  0 0 0 0.68 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="17">
        <animate attributeName="seed" values="17;29;43;17" dur="10s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.035"/></feComponentTransfer>
    </filter>
    <clipPath id="canvas"><rect width="1000" height="360"/></clipPath>
  </defs>

  <rect width="1000" height="360" fill="#05070a"/>
  <rect width="1000" height="360" fill="url(#redAura)"/>
  <rect width="1000" height="360" fill="url(#scanlines)"/>
  <rect width="1000" height="360" filter="url(#noise)" opacity="0.65"/>

  <g clip-path="url(#canvas)">
    <path d="M438 26V334" stroke="url(#divider)"/>
    <path d="M0 38H1000M0 322H1000" stroke="#ef3340" stroke-opacity="0.16"/>

    <g font-family="Consolas, 'Courier New', monospace" text-anchor="middle" font-weight="700" filter="url(#redGlow)">
      <text x="66" y="80" fill="#ed1c24" font-size="14" text-anchor="start" xml:space="preserve">
        <tspan x="66" dy="0">                   -`</tspan>
        <tspan x="66" dy="14">                  .o+`</tspan>
        <tspan x="66" dy="14">                 `ooo/</tspan>
        <tspan x="66" dy="14">                `+oooo:</tspan>
        <tspan x="66" dy="14">               `+oooooo:</tspan>
        <tspan x="66" dy="14">               -+oooooo+:</tspan>
        <tspan x="66" dy="14">             `/:-:++oooo+:</tspan>
        <tspan x="66" dy="14">            `/++++/+++++++:</tspan>
        <tspan x="66" dy="14">           `/++++++++++++++:</tspan>
        <tspan x="66" dy="14">          `/+++ooooooooooooo/`</tspan>
        <tspan x="66" dy="14">         ./ooosssso++osssssso+`</tspan>
        <tspan x="66" dy="14">        .oossssso-````/ossssss+`</tspan>
        <tspan x="66" dy="14">       -osssssso.      :ssssssso.</tspan>
        <tspan x="66" dy="14">      :osssssss/        osssso+++.</tspan>
        <tspan x="66" dy="14">     /ossssssss/        +ssssooo/-</tspan>
        <tspan x="66" dy="14">   `/ossssso+/:-        -:/+osssso+-</tspan>
        <tspan x="66" dy="14">  `+sso+:-`                 `.-/+oso:</tspan>
        <tspan x="66" dy="14"> `++:.                           `-/+/</tspan>
        <tspan x="66" dy="14"> .`                                 `/</tspan>
      </text>
      <g fill="#92969d" font-size="13.5">
        <text x="220" y="20">/\</text>
        <text x="220" y="32">||||</text>
        <text x="220" y="44">||||</text>
        <text x="220" y="56">=====||||=====</text>
        <text x="220" y="68">||||</text>
        <text x="220" y="80">||||</text>
        <text x="220" y="92">||</text>
        <text x="220" y="104">||</text>
        <text x="220" y="116">||</text>
        <text x="220" y="128">||</text>
        <text x="220" y="140">||</text>
        <text x="220" y="152">||</text>
        <text x="220" y="164">||</text>
        <text x="220" y="176">||</text>
        <text x="220" y="188">||</text>
        <text x="220" y="200">||</text>
        <text x="220" y="212">||</text>
        <text x="220" y="224">||</text>
        <text x="220" y="236">||</text>
        <text x="220" y="248">||</text>
        <text x="220" y="260">||</text>
        <text x="220" y="272">||</text>
        <text x="220" y="284">||</text>
        <text x="220" y="296">||</text>
        <text x="220" y="308">||</text>
        <text x="220" y="320">||</text>
        <text x="220" y="332">||</text>
      </g>
      <animate attributeName="opacity" values="0.86;1;0.93;1" dur="5s" repeatCount="indefinite"/>
    </g>

    <g font-family="Consolas, 'Courier New', monospace">
      <text x="510" y="118" fill="#8b949e" font-size="15" letter-spacing="2">abhijeet@github:~$ whoami</text>
      <text x="510" y="177" fill="#f4f7fb" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="1" filter="url(#textGlow)">Abhijeet Ranjan</text>
      <path d="M510 202H880" stroke="#ef3340" stroke-opacity="0.34"/>
      <circle cx="519" cy="241" r="5" fill="#58d68d">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="536" y="246" fill="#8b949e" font-size="14">status:</text>
      <text x="604" y="246" fill="#58d68d" font-size="14" font-weight="700" letter-spacing="1.6">ONLINE</text>
      <rect x="680" y="233" width="9" height="16" fill="#ef3340">
        <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <rect x="0" y="-55" width="1000" height="62" fill="#ef3340" opacity="0.05">
      <animate attributeName="y" values="-60;370" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
